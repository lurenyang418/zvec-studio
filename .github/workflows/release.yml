name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  direct-distribution:
    runs-on: macos-15
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v7
        with:
          path: zvec-studio
      - name: Check formatting
        working-directory: zvec-studio
        run: xcrun swift-format lint --recursive --strict --configuration .swift-format Sources Tests Package.swift
      - name: Test
        working-directory: zvec-studio
        run: swift test
      - name: Determine package version
        working-directory: zvec-studio
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(plutil -extract CFBundleShortVersionString raw Resources/Info.plist)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/zvec-studio-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F\" '/Developer ID Application/ { print $2; exit }')"
          test -n "$IDENTITY"
          echo "DEVELOPER_ID_APPLICATION=$IDENTITY" >> "$GITHUB_ENV"
      - name: Prepare notarization key
        env:
          PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          test -n "$PRIVATE_KEY_BASE64"
          test -n "$KEY_ID"
          test -n "$ISSUER_ID"
          PRIVATE_KEY_PATH="$RUNNER_TEMP/AuthKey_${KEY_ID}.p8"
          printf '%s' "$PRIVATE_KEY_BASE64" | base64 --decode > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          echo "NOTARY_KEY_PATH=$PRIVATE_KEY_PATH" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER_ID=$ISSUER_ID" >> "$GITHUB_ENV"
      - name: Build, sign, notarize, and staple
        working-directory: zvec-studio
        run: scripts/build-dmg.sh
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: zvec-studio
        run: |
          ASSET="dist/ZvecStudio-${VERSION}-arm64.dmg"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET" --verify-tag --generate-notes --title "Zvec Studio ${VERSION}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Remove signing credentials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/zvec-studio-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer-id.p12" "${NOTARY_KEY_PATH:-}"
