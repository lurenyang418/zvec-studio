name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  direct-distribution:
    runs-on: macos-15
    steps:
      - name: Checkout Studio
        uses: actions/checkout@v7
        with:
          path: zvec-studio
      - name: Check formatting
        working-directory: zvec-studio
        run: xcrun swift-format lint --recursive --strict --configuration .swift-format Sources Tests Package.swift
      - name: Test
        working-directory: zvec-studio
        run: swift test
      - name: Determine package version
        id: version
        working-directory: zvec-studio
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(plutil -extract CFBundleShortVersionString raw Resources/Info.plist)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build and ad-hoc sign DMG
        working-directory: zvec-studio
        run: scripts/build-dmg.sh
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: zvec-studio-macos-${{ steps.version.outputs.version }}-arm64
          path: zvec-studio/dist/ZvecStudio-${{ steps.version.outputs.version }}-arm64.dmg
          if-no-files-found: error
      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: zvec-studio
        run: |
          ASSET="dist/ZvecStudio-${VERSION}-arm64.dmg"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET" --verify-tag --generate-notes --title "Zvec Studio ${VERSION}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
